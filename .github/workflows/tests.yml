name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        laravel: ['10.*', '11.*', '12.*']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Laravel version
        run: composer require "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.laravel == '10.*' && '^8.0' || matrix.laravel == '11.*' && '^9.0' || '^10.0' }}" --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --with-all-dependencies

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Run Pest
        run: vendor/bin/pest
